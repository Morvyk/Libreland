# xdg-desktop-portal backend routing for Libreland.
#
# Libreland follows the wlroots portal model: it implements the
# zwlr_screencopy protocol itself (so screenshots and screen sharing
# work), and delegates everything else to the generic backends.
#
# Install to one of:
#   ~/.config/xdg-desktop-portal/libreland-portals.conf   (per-user)
#   /usr/share/xdg-desktop-portal/libreland-portals.conf  (system)
#
# It is selected when XDG_CURRENT_DESKTOP contains "libreland"; set that
# in Libreland's config, e.g.:
#   env = { XDG_CURRENT_DESKTOP = "libreland" }
#
# Required packages:
#   xdg-desktop-portal           (the frontend daemon)
#   xdg-desktop-portal-wlr       (ScreenCast + Screenshot via screencopy)
#   xdg-desktop-portal-gtk       (FileChooser, Settings, Notification, ...)
#     (or xdg-desktop-portal-kde — swap "gtk" for "kde" below to match
#      your QT_QPA_PLATFORMTHEME)

[preferred]
default=gtk
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
